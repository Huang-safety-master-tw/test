<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>職安大師 - 正式模擬考</title>
    <style>
:root {
  color-scheme: light;
  font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
  color: #1f2a2b;
  background: #f6f8f6;
  --green: #0b6b56;
  --green-2: #e8f3ef;
  --line: #d9e1de;
  --muted: #687777;
  --paper: #fffefa;
  --amber: #f7d66b;
  --red: #d92d3a;
  --blue: #256f9f;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.safety-master-back-home {
  position: fixed;
  left: 14px;
  bottom: 14px;
  z-index: 1000;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(11, 107, 86, 0.22);
  background: rgba(11, 107, 86, 0.96);
  color: white;
  text-decoration: none;
  font-size: 14px;
  font-weight: 800;
  box-shadow: 0 10px 28px rgba(11, 107, 86, 0.24);
}

.safety-master-back-home:hover {
  background: #085846;
}

@media (max-width: 640px) {
  .safety-master-back-home {
    left: 10px;
    bottom: 10px;
    padding: 9px 12px;
    font-size: 13px;
  }
}

.app-header {
  height: 60px;
  display: flex;
  align-items: center;
  gap: 22px;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.94);
  position: sticky;
  top: 0;
  z-index: 20;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 292px;
}

.brand b {
  display: block;
  font-size: 15px;
}

.brand small,
.top-stats small,
.exam-title small,
.reader-toolbar small {
  display: block;
  color: var(--muted);
  font-size: 12px;
}

.badge {
  width: 31px;
  height: 31px;
  border-radius: 7px;
  display: grid;
  place-items: center;
  color: white;
  font-weight: 800;
  background: var(--green);
}

nav {
  display: flex;
  align-items: center;
  gap: 5px;
}

nav button,
.mode-switch button,
.tab {
  border: 0;
  background: transparent;
  color: #2d3b3c;
  padding: 9px 13px;
  border-radius: 6px;
}

nav button.active,
.mode-switch button.active,
.tab.active {
  background: var(--green-2);
  color: var(--green);
  font-weight: 700;
}

.top-stats {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 18px;
}

.top-stats span {
  min-width: 58px;
  text-align: center;
}

.top-stats b {
  display: block;
  font-size: 16px;
}

.red,
.danger {
  color: var(--red);
}

.outline,
.ghost,
.primary,
.icon-button {
  border: 1px solid var(--line);
  background: white;
  color: #203031;
  min-height: 36px;
  padding: 8px 12px;
  border-radius: 6px;
}

.outline {
  color: var(--green);
  border-color: #9dc6ba;
  font-weight: 700;
}

.primary {
  background: var(--green);
  border-color: var(--green);
  color: white;
  font-weight: 700;
}

.workspace {
  height: calc(100vh - 60px);
  display: grid;
  grid-template-columns: 304px minmax(430px, 1fr) 560px;
  overflow: hidden;
}

.left-pane,
.reader-pane,
.right-pane {
  min-height: 0;
  overflow: auto;
  background: #fbfcfb;
}

.left-pane {
  border-right: 1px solid var(--line);
  padding: 16px 14px;
}

.reader-pane {
  background: #f9fbfa;
}

.right-pane {
  border-left: 1px solid var(--line);
  padding: 14px 18px 82px;
  background: white;
}

.mode-switch {
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
  margin-bottom: 14px;
}

.search {
  display: block;
  margin-bottom: 16px;
}

.search span {
  display: none;
}

.search input {
  width: 100%;
  border: 1px solid var(--line);
  background: white;
  border-radius: 6px;
  padding: 10px 11px;
  outline-color: #8cc5b5;
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 2px;
  color: var(--green);
  font-weight: 800;
  border-bottom: 2px solid var(--green);
}

.section-head.small {
  margin-top: 18px;
  color: #2e4242;
  border-bottom: 1px solid var(--line);
}

.material-list,
.topic-list {
  display: grid;
  gap: 3px;
  margin-top: 8px;
}

.material-list button,
.topic-list button,
.topic-row {
  width: 100%;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 9px;
  text-align: left;
  border: 1px solid transparent;
  background: transparent;
  padding: 10px 9px;
  border-radius: 6px;
}

.material-list button.active,
.topic-list button.active {
  background: var(--green-2);
  border-color: #9dc6ba;
}

.material-list strong,
.topic-list span {
  font-size: 14px;
}

.material-list em,
.topic-list small,
.muted {
  color: var(--muted);
  font-style: normal;
  font-size: 12px;
}

.pdf {
  color: var(--red);
  font-size: 11px;
  border: 1px solid #f0a7ad;
  border-radius: 4px;
  padding: 2px 3px;
}

.reader-toolbar {
  height: 58px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  background: white;
}

.spacer {
  flex: 1;
}

.paper {
  max-width: 680px;
  margin: 28px auto;
  padding: 28px 30px;
  background: var(--paper);
  border: 1px solid #e3ded1;
  border-radius: 8px;
  line-height: 1.72;
  box-shadow: 0 1px 0 rgba(34, 48, 48, 0.03);
}

.eyebrow {
  color: var(--green);
  font-weight: 800;
  margin: 0 0 8px;
}

.paper h1 {
  font-size: 25px;
  margin: 0 0 16px;
  letter-spacing: 0;
}

.paper h3 {
  font-size: 16px;
  margin: 18px 0 7px;
}

.law-highlight {
  border: 1px solid #ebc54e;
  background: #fff8dd;
  padding: 14px 16px;
  border-radius: 7px;
}

.cheat-sheet {
  margin: 16px 0 18px;
  border: 1px solid #cfe0da;
  background: #f7fbf9;
  border-radius: 8px;
  padding: 15px;
}

.cheat-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 12px;
}

.cheat-head b {
  color: var(--green);
  font-size: 17px;
}

.cheat-head span {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
  text-align: right;
}

.cheat-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.cheat-grid > div {
  border: 1px solid var(--line);
  background: white;
  border-radius: 7px;
  padding: 12px;
}

.cheat-grid h3 {
  margin-top: 0;
}

.law-highlight p,
.source-box span {
  margin: 6px 0 0;
  display: block;
}

.source-box {
  border: 1px solid #b9d2df;
  background: #f1f8fb;
  padding: 13px 15px;
  border-radius: 7px;
  margin-top: 22px;
}

.source-box a {
  display: inline-block;
  margin-top: 10px;
  color: var(--green);
  font-weight: 800;
  text-decoration: none;
}

.quick-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin: 16px 0 18px;
}

.quick-grid div {
  border: 1px solid var(--line);
  background: #fbfdfc;
  border-radius: 7px;
  padding: 12px;
}

.quick-grid b {
  display: block;
  color: var(--green);
  font-size: 22px;
  line-height: 1;
}

.quick-grid span {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 12px;
}

.note-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin: 18px 0;
}

.sheet-block {
  border: 1px solid var(--line);
  background: #fbfdfc;
  border-radius: 8px;
  padding: 14px 16px;
}

.sheet-block h3 {
  margin-top: 0;
}

.study-list {
  margin: 8px 0 16px;
  padding: 0;
  display: grid;
  gap: 8px;
  list-style: none;
}

.study-list li {
  position: relative;
  padding-left: 18px;
  line-height: 1.6;
}

.study-list li::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  position: absolute;
  left: 0;
  top: 0.72em;
}

.study-list.warn li::before {
  background: #d59d11;
}

.question-panel {
  min-width: 0;
}

.panel-tabs {
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 10px;
}

.pill,
.source-chip {
  border: 1px solid #aacac2;
  color: var(--green);
  background: #f0f8f5;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.pill.danger {
  border-color: #f1aab0;
  background: #fff3f4;
}

.question-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 12px;
  margin: 18px 0 12px;
}

.icon-button {
  margin-left: auto;
  min-height: 30px;
  padding: 5px 9px;
  color: var(--green);
}

.question-panel h2 {
  font-size: 18px;
  line-height: 1.58;
  margin: 0 0 16px;
  letter-spacing: 0;
}

.options {
  display: grid;
  gap: 10px;
}

.option {
  display: grid;
  grid-template-columns: 34px 1fr;
  align-items: center;
  gap: 12px;
  width: 100%;
  text-align: left;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 7px;
  padding: 11px 14px;
}

.option span {
  width: 28px;
  height: 28px;
  border: 1px solid #acb9b8;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: #5d6969;
  font-weight: 800;
}

.option strong {
  font-weight: 500;
  line-height: 1.5;
}

.option.selected {
  border-color: var(--green);
  background: #f4faf7;
}

.option.correct {
  border-color: var(--green);
  background: #edf8f2;
}

.option.correct span {
  color: white;
  background: var(--green);
  border-color: var(--green);
}

.option.wrong {
  border-color: #ef9aa2;
  background: #fff5f5;
  color: var(--red);
}

.option.wrong span {
  color: white;
  background: var(--red);
  border-color: var(--red);
}

.answer-box {
  margin-top: 16px;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 14px;
  background: #f7faf8;
}

.answer-box.ng {
  border-color: #f1b2b8;
  background: #fff7f7;
}

.answer-box p {
  margin: 7px 0 0;
  line-height: 1.6;
}

.answer-ladder {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin-top: 13px;
}

.answer-ladder div {
  border: 1px solid #d6e3df;
  background: white;
  border-radius: 7px;
  padding: 10px;
}

.answer-ladder span,
.answer-ladder strong {
  display: block;
}

.answer-ladder span {
  color: var(--green);
  font-size: 12px;
  font-weight: 800;
  margin-bottom: 4px;
}

.answer-ladder strong {
  color: #263636;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.45;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.detail-card {
  border: 1px solid var(--line);
  background: white;
  border-radius: 7px;
  padding: 12px;
}

.detail-card h3 {
  margin: 0 0 8px;
  font-size: 14px;
  color: var(--green);
}

.detail-card p,
.detail-card small {
  margin: 0;
  color: #334445;
  line-height: 1.6;
}

.detail-card small {
  display: block;
  margin-top: 6px;
  color: var(--muted);
}

.detail-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 6px;
}

.detail-list.warn li::marker {
  color: #d59d11;
}

.insight-panel {
  margin-top: 14px;
  border: 1px solid #cfe0da;
  background: #fbfdfc;
  border-radius: 8px;
  padding: 13px;
}

.insight-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.insight-head b {
  color: var(--green);
}

.insight-head span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
  text-align: right;
}

.keyword-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.keyword-row span {
  border: 1px solid #d6e3df;
  background: white;
  color: #2d4444;
  border-radius: 999px;
  padding: 4px 8px;
  font-size: 12px;
  line-height: 1.35;
}

.insight-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.insight-grid section {
  min-width: 0;
}

.insight-grid h3 {
  margin: 0 0 8px;
  font-size: 14px;
  color: #2d4444;
}

.related-block {
  margin-top: 14px;
  border-top: 1px solid #dfe8e4;
  padding-top: 14px;
}

.related-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}

.related-head b {
  color: var(--green);
}

.related-head span {
  color: var(--muted);
  font-size: 12px;
}

.related-list {
  display: grid;
  gap: 8px;
}

.related-question {
  width: 100%;
  text-align: left;
  border: 1px solid #cfe0da;
  background: white;
  border-radius: 7px;
  padding: 11px 12px;
}

.related-question strong {
  display: inline-block;
  color: var(--green);
  font-size: 12px;
  margin-bottom: 4px;
}

.related-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 5px;
}

.related-top em {
  color: var(--muted);
  font-style: normal;
  font-size: 12px;
}

.related-question span {
  display: block;
  color: #213334;
  line-height: 1.5;
}

.extension-panel {
  margin-top: 16px;
  border-top: 1px solid #dfe8e4;
  padding-top: 14px;
}

.extension-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 12px;
}

.tag-row span {
  border: 1px solid #aacac2;
  color: var(--green);
  border-radius: 999px;
  padding: 5px 9px;
  font-size: 12px;
  background: white;
}

.bottom-actions {
  position: sticky;
  bottom: 0;
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 14px 0 0;
  margin-top: 18px;
  background: linear-gradient(to bottom, rgba(255, 255, 255, 0), white 22%);
}

.exam-layout {
  min-height: calc(100vh - 60px);
  display: grid;
  grid-template-columns: 338px minmax(0, 1fr);
}

.exam-sheet {
  border-right: 1px solid var(--line);
  background: #fbfcfb;
  padding: 22px 18px;
}

.exam-title b {
  display: block;
  font-size: 18px;
}

.timer {
  font-size: 42px;
  font-weight: 900;
  color: var(--green);
  margin: 22px 0 8px;
  font-variant-numeric: tabular-nums;
}

.progress-line {
  height: 8px;
  background: #e7ecea;
  border-radius: 999px;
  overflow: hidden;
}

.progress-line span {
  display: block;
  height: 100%;
  background: var(--green);
}

.number-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
  margin: 18px 0;
}

.number-grid button {
  min-height: 33px;
  border: 1px solid var(--line);
  background: white;
  border-radius: 5px;
  font-size: 13px;
}

.number-grid button.done {
  background: var(--green-2);
  border-color: #9dc6ba;
}

.number-grid button.active {
  background: var(--green);
  color: white;
  border-color: var(--green);
}

.wide {
  width: 100%;
  margin-top: 8px;
}

.exam-main {
  padding: 24px 28px 80px;
  max-width: 1040px;
}

.score-banner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid #b9d2df;
  background: #f1f8fb;
  padding: 14px 16px;
  border-radius: 7px;
  margin-bottom: 18px;
}

.exam-review {
  margin-top: 24px;
  border: 1px solid var(--line);
  background: white;
  border-radius: 8px;
  padding: 16px;
}

.exam-review.ok {
  border-color: #b7d4c9;
  background: #f6fbf8;
}

.review-head,
.review-card-head,
.review-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.review-head {
  margin-bottom: 14px;
}

.review-head b {
  display: block;
  color: var(--green);
  font-size: 18px;
}

.review-head span {
  color: var(--muted);
  font-size: 13px;
}

.review-list {
  display: grid;
  gap: 14px;
}

.review-card {
  border: 1px solid #dfe8e4;
  border-radius: 8px;
  background: #fffefa;
  padding: 14px;
}

.review-card h3 {
  margin: 12px 0;
  font-size: 18px;
  line-height: 1.55;
}

.review-card-head strong {
  flex: 1;
  color: #2d4444;
}

.answer-compare {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 12px 0;
}

.answer-compare div {
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 11px;
  background: white;
}

.answer-compare b,
.answer-compare span {
  display: block;
}

.answer-compare b {
  margin-bottom: 6px;
  font-size: 13px;
}

.wrong-answer b {
  color: var(--red);
}

.right-answer b {
  color: var(--green);
}

.answer-compare span {
  line-height: 1.5;
}

.review-explain {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.review-explain section {
  border: 1px solid #dfe8e4;
  background: white;
  border-radius: 7px;
  padding: 12px;
}

.review-explain h4 {
  margin: 0 0 8px;
  color: var(--green);
  font-size: 14px;
}

.review-explain p {
  margin: 0 0 8px;
  line-height: 1.6;
}

.review-foot {
  justify-content: flex-start;
  flex-wrap: wrap;
  margin-top: 12px;
}

.review-foot span {
  border: 1px solid #aacac2;
  color: var(--green);
  border-radius: 999px;
  padding: 5px 9px;
  font-size: 12px;
  background: white;
}

.stats-page {
  max-width: 1080px;
  margin: 0 auto;
  padding: 28px;
}

.stats-hero h1 {
  margin: 0 0 18px;
  font-size: 26px;
}

.stat-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.stat-cards div,
.table-panel {
  background: white;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.stat-cards div {
  padding: 17px;
}

.stat-cards b {
  display: block;
  font-size: 28px;
  color: var(--green);
}

.stat-cards span {
  color: var(--muted);
}

.table-panel {
  margin-top: 22px;
  padding: 12px;
}

.topic-row {
  border-bottom: 1px solid #eef2f0;
  border-radius: 0;
}

.topic-row strong,
.topic-row em {
  font-style: normal;
  color: var(--muted);
}

@media (max-width: 1100px) {

    const stats = topicProgress(topic);
    const pct = stats.total ? Math.round((stats.correct / stats.total) * 100) : 0;
    const mistakeCount = (progress.lastMistakes || []).filter((item) => (item.q?.topic || "未分類") === topic).length;
    const guide = topicGuide(topic, material?.category);
    const weakSignal =
      stats.total === 0
        ? "尚未建立答題紀錄，建議先完成 10 題建立基準。"
        : pct < 60
          ? `目前正確率 ${pct}%，建議先回頭補法規條件與數字題。`
          : `目前正確率 ${pct}%，可改做延伸題與複選題拉高穩定度。`;

    return {
      title: material?.title || topic,
      chapter: material?.category || topic,
      excerpt: material?.fileName
        ? `本章對應教材為「${material.fileName}」，建議先看中央速查，再搭配右側題目與答後詳解交叉複習。`
        : "此主題目前沒有對應教材檔名，建議先用右側題目建立觀念，再回到主題清單整理弱點。",
      highlight: `本章共 ${related.length} 題，其中官方題 ${official} 題、延伸／考古 ${extended} 題、複選 ${multi} 題。`,
      focus: [
        guide.quickLook[0],
        guide.quickLook[1],
        weakSignal,
        mistakeCount ? `最近錯題記錄 ${mistakeCount} 題，建議優先複習錯題再做延伸。` : "近期沒有記錄到此主題錯題，可先維持順序練習。",
      ],
      traps: [...guide.traps],
      quickLook: [...guide.quickLook],
      memoryHooks: [...guide.memoryHooks],
      reviewPlan: [
        `先做 ${Math.min(10, Math.max(5, Math.ceil(related.length / 10)))} 題同主題題目建立手感。`,
        extended ? `再切到延伸練習補 ${Math.min(extended, 6)} 題不同問法。` : "目前延伸題較少，建議先以官方題做錯題歸納。",
        multi ? `本章有 ${multi} 題複選題，最後再抽查複選題穩定記憶。` : "本章複選題不多，可優先把單選題打熟。",
      ],
      source: material?.fileName || "題庫整理",
      category: material?.category || "主題複習",
      url: material?.url,
      total: related.length,
      official,
      extended,
      multi,
      stats,
      pct,
      cheatSheet: buildCheatSheet(topic, material?.category || topic, guide, related),
    };
  }

  function filteredQuestions() {
    const topicPool = questions.filter((q) => q.topic === state.topic);
    let pool = [...topicPool];
    if (state.mode === "official") pool = topicPool.filter((q) => sourceBucket(q) === "official");
    if (state.mode === "extended") pool = topicPool.filter((q) => sourceBucket(q) === "extended");
    if (state.mode === "wrong") pool = questions.filter((q) => q.source === "錯題回顧" || state.bookmarks.has(q.id));
    if (state.query.trim()) {
      const key = state.query.trim();
      pool = pool.filter((q) => `${q.question} ${q.options.join(" ")} ${q.topic} ${q.workItemTitle || ""}`.includes(key));
    }
    if (pool.length) return pool;
    if (topicPool.length) return topicPool;
    return questions.slice(0, 1);
  }

  function currentQuestion() {
    const pool = filteredQuestions();
    state.index = Math.max(0, Math.min(state.index, pool.length - 1));
    return pool[state.index];
  }

  function noteForQuestion(question) {
    return materialNote(materialMap.get(question.topic) || { topic: question.topic, title: question.workItemTitle || question.topic });
  }

  function explainText(question) {
    return String(question.explanation || "").trim();
  }

  function isGenericExplanation(explanation) {
    return /官方題庫答案為|請回到來源|對照完整法規脈絡|題庫答案/.test(explanation);
  }

  function explanationPackage(question) {
    const note = noteForQuestion(question);
    const explanation = explainText(question);
    const answerText = answerLabelText(question.answer);
    const answerOptions = question.answer.map((idx) => optionText(question, idx)).join("、");
    const focusType = detectFocusType(question);
    const keywords = extractKeywords(`${question.question} ${question.workItemTitle || ""}`);
    const cue = keywords.slice(0, 3).join("、") || question.topic;
    const numbers = keywords.filter((item) => /\d/.test(item));
    const anchor = lawAnchorFor(question, note, keywords);
    const checklist = conditionChecklist(question, focusType, keywords);
    const summary =
      explanation.length > 40 && !isGenericExplanation(explanation)
        ? explanation
        : `這題屬於${focusType}題，核心在辨識「${cue}」的正確條件；答案是 ${answerText}，對應選項為「${answerOptions}」。`;
    const reasoning = [
      `先定位題幹主軸：本題在考「${question.workItemTitle || question.topic}」中的 ${focusType} 判斷，看到 ${cue} 時要先回到本章制度或法規脈絡。`,
      `考點錨點是「${anchor.law}」。作答時不要只看熟悉名詞，應先確認題目正在問對象、義務、程序或數字。`,
      `正確答案是 ${answerText}。若只記結論不記條件，容易和同主題相近選項混淆；建議把「${answerOptions}」和題幹關鍵字一起背。`,
      numbers.length
        ? `本題包含 ${numbers.join("、")} 等數字／期限訊號，作答時要先圈出數字再看選項，避免被相似敘述帶走。`
        : `若兩個選項都像正解，請回頭檢查主詞、適用對象與是否屬於本章規範；這通常比死背選項更有效。`,
    ];
    const elimination = [
      note.traps[0],
      note.memoryHooks[0],
      question.type === "multi" ? "複選題請先排除明顯不屬於本章的選項，再確認剩餘答案是否缺一不可。" : "單選題遇到熟悉名詞時，要再確認它是否真的符合題幹條件。",
    ];
    const materialAnchor = {
      title: note.title || question.topic,
      chapter: note.chapter || note.category || question.topic,
      source: note.source || question.sourceFile || "題庫整理",
    };
    return {
      summary,
      reasoning,
      elimination,
      anchor: materialAnchor,
      drillSteps: [
        { label: "定位", value: anchor.law },
        { label: "判斷", value: focusType },
        { label: "答案", value: `${answerText}：${shortText(answerOptions, 52)}` },
        { label: "延伸", value: question.parentId ? "回看母題，再改寫條件重練一次。" : "切到延伸練習，確認同觀念能否遷移。" },
      ],
      insight: {
        law: anchor.law,
        source: anchor.source,
        keywords: anchor.keywords,
        checklist,
        prompts: extensionPrompts(question, anchor, cue, answerOptions),
      },
    };
  }

  function relatedQuestionsFor(question) {
    return questions
      .filter((item) => item.id !== question.id && item.topic === question.topic)
      .map((item) => ({
        item,
        score:
          (sourceBucket(item) === "extended" ? 0 : 3) +
          (item.workItemTitle === question.workItemTitle ? 0 : 2) +
          (item.type === question.type ? 0 : 1),
      }))
      .sort((a, b) => a.score - b.score || String(a.item.id).localeCompare(String(b.item.id)))
      .map(({ item }) => item)
      .slice(0, 6);
  }

  function extensionQuestionSet(question) {
    const related = relatedQuestionsFor(question);
    return related.slice(0, 3).map((item, index) => {
      let reason = "同主題延伸";
      if (sourceBucket(item) === "extended") reason = "不同問法";
      else if (item.type !== question.type) reason = "題型切換";
      else if (item.workItemTitle === question.workItemTitle) reason = "同章節追打";
      return {
        ...item,
        reason,
        badge: index === 0 ? "優先做" : index === 1 ? "補強概念" : "混合檢查",
      };
    });
  }

  function jumpToQuestion(questionId) {
    const next = questions.find((q) => q.id === questionId);
    if (!next) return;
    const material = materialMap.get(next.topic);
    state.view = "study";
    state.topic = next.topic;
    state.materialId = material?.id || state.materialId;
    state.mode = sourceBucket(next) === "extended" ? "extended" : sourceBucket(next) === "wrong" ? "wrong" : "topic";
    const pool = filteredQuestions();
    const nextIndex = pool.findIndex((q) => q.id === questionId);
    state.index = nextIndex >= 0 ? nextIndex : 0;
    state.selected = [];
    state.checked = false;
    syncHash();
  }

  function jumpTopic(step) {
    const topics = uniqueTopics();
    const currentIdx = Math.max(0, topics.indexOf(state.topic));
    const nextTopic = topics[(currentIdx + step + topics.length) % topics.length];
    state.topic = nextTopic;
    state.materialId = materialMap.get(nextTopic)?.id || state.materialId;
    state.index = 0;
    state.selected = [];
    state.checked = false;
  }

  function toggleAnswer(index) {
    const question = currentQuestion();
    if (question.type === "single") {
      state.selected = [index];
    } else if (state.selected.includes(index)) {
      state.selected = state.selected.filter((item) => item !== index);
    } else {
      state.selected = [...state.selected, index].sort();
    }
    state.checked = false;
    render();
  }

  function isCorrect(selected, answer) {
    return selected.length === answer.length && selected.every((value, index) => value === answer[index]);
  }

  function shuffle(items) {
    return [...items].sort(() => Math.random() - 0.5);
  }

  function gradeExam(exam) {
    const correct = exam.questions.reduce((sum, question, index) => sum + (isCorrect(exam.answers[index], question.answer) ? 1 : 0), 0);
    const score = Math.round((correct / exam.questions.length) * 100);
    return { correct, score, pass: score >= 60 };
  }

  function examMistakes(exam) {
    return exam.questions
      .map((question, index) => ({ question, index, selected: exam.answers[index] || [] }))
      .filter((item) => !isCorrect(item.selected, item.question.answer));
  }

  function selectedAnswerText(question, selected) {
    if (!selected.length) return "未作答";
    return `${answerLabelText(selected)}：${selected.map((index) => optionText(question, index)).join("、")}`;
  }

  function correctAnswerText(question) {
    return `${answerLabelText(question.answer)}：${question.answer.map((index) => optionText(question, index)).join("、")}`;
  }

  function examReview(exam) {
    if (!exam?.submitted) return "";
    const mistakes = examMistakes(exam);
    if (!mistakes.length) {
      return `
        <section class="exam-review ok">
          <div class="review-head">
            <div><b>錯題詳解</b><span>本次沒有錯題</span></div>
          </div>
          <p>本次模擬考全部答對。建議接著切換到延伸練習或重新抽題，確認不是只熟悉本輪題目。</p>
        </section>`;
    }

    return `
      <section class="exam-review">
        <div class="review-head">
          <div><b>錯題詳解</b><span>${mistakes.length} 題需要複習</span></div>
          <button class="outline" data-action="jump-first-mistake">查看第一題錯題</button>
        </div>
        <div class="review-list">
          ${mistakes
            .map(({ question, index, selected }) => {
              const explain = explanationPackage(question);
              return `<article class="review-card">
                <div class="review-card-head">
                  <span class="source-chip">第 ${index + 1} 題</span>
                  <strong>${escapeHtml(question.topic)}</strong>
                  <button class="ghost" data-exam-jump="${index}">查看此題</button>
                </div>
                <h3>${escapeHtml(question.question)}</h3>
                <div class="answer-compare">
                  <div class="wrong-answer"><b>你的答案</b><span>${escapeHtml(selectedAnswerText(question, selected))}</span></div>
                  <div class="right-answer"><b>正確答案</b><span>${escapeHtml(correctAnswerText(question))}</span></div>
                </div>
                <div class="review-explain">
                  <section>
                    <h4>為什麼是這個答案</h4>
                    <p>${escapeHtml(explain.summary)}</p>
                    <ul class="detail-list">${explain.reasoning.slice(1, 4).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                  </section>
                  <section>
                    <h4>下次避免錯的方法</h4>
                    <ul class="detail-list warn">${explain.elimination.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                  </section>
                </div>
                <div class="review-foot">
                  <span>${escapeHtml(question.sourceFile || "題庫整理")}</span>
                  <span>${escapeHtml(explain.anchor.title)}</span>
                  <span>${questionTypeLabel(question.type)}</span>
                </div>
              </article>`;
            })
            .join("")}
        </div>
      </section>`;
  }

  function startExam() {
    const officialQuestions = questions.filter((q) => sourceBucket(q) === "official");
    const singles = shuffle(officialQuestions.filter((q) => q.type === "single")).slice(0, examRule.single || 60);
    const multis = shuffle(officialQuestions.filter((q) => q.type === "multi")).slice(0, examRule.multi || 20);
    const examQuestions = shuffle([...singles, ...multis]);
    state.exam = {
      questions: examQuestions,
      current: 0,
      answers: examQuestions.map(() => []),
      startedAt: Date.now(),
      endsAt: Date.now() + (examRule.minutes || 100) * 60 * 1000,
      submitted: false,
    };
  }

  function escapeHtml(text) {
    return String(text).replace(/[&<>"']/g, (match) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[match]);
  }

  function escapeAttr(text) {
    return escapeHtml(text).replace(/"/g, "&quot;");
  }

  function detailSection(title, body) {
    return `<section class="detail-card"><h3>${title}</h3>${body}</section>`;
  }

  function syncHash() {
    location.hash = state.view === "study" ? "" : `#${state.view}`;
  }

  function openExtendedMode(question) {
    const pool = questions.filter((item) => item.topic === question.topic && sourceBucket(item) === "extended");
    state.view = "study";
    state.topic = question.topic;
    state.materialId = materialMap.get(question.topic)?.id || state.materialId;
    state.mode = pool.length ? "extended" : "topic";
    state.index = 0;
    state.selected = [];
    state.checked = false;
    syncHash();
  }

  function questionCard(question, context = "study") {
    const checked = context === "study" ? state.checked : Boolean(state.exam?.submitted);
    const selected = context === "study" ? state.selected : state.exam?.answers[state.exam.current] || [];
    const ok = checked && isCorrect(selected, question.answer);
    const note = noteForQuestion(question);
    const explain = explanationPackage(question);
    const extensionSet = extensionQuestionSet(question);
    const extensionCount = questions.filter((item) => item.topic === question.topic && sourceBucket(item) === "extended").length;
    const sourceLabel = question.source || (sourceBucket(question) === "official" ? "官方題庫" : "題庫");

    return `
      <section class="question-panel">
        <div class="panel-tabs">
          <button class="tab active">題目練習</button>
          <button class="tab">${escapeHtml(question.workItemTitle || question.topic)}</button>
          <span class="spacer"></span>
          <span class="pill ${question.type === "multi" ? "danger" : ""}">${questionTypeLabel(question.type)}</span>
          <span class="muted">題號 ${context === "exam" ? state.exam.current + 1 : state.index + 1}</span>
        </div>
        <div class="question-meta">
          <span class="source-chip">${escapeHtml(sourceLabel)}</span>
          <span>${escapeHtml(question.sourceFile || "題庫整理")}</span>
          <button class="icon-button" data-action="bookmark" title="收藏本題">${state.bookmarks.has(question.id) ? "已收藏" : "收藏"}</button>
        </div>
        <h2>${escapeHtml(question.question)}</h2>
        <div class="options">
          ${question.options
            .map((option, index) => {
              const picked = selected.includes(index);
              const correct = question.answer.includes(index);
              const cls = checked ? (correct ? "correct" : picked ? "wrong" : "") : picked ? "selected" : "";
              return `<button class="option ${cls}" data-answer="${index}">
                <span>${labels[index]}</span>
                <strong>${escapeHtml(option)}</strong>
              </button>`;
            })
            .join("")}
        </div>
        ${
          checked
            ? `<div class="answer-box ${ok ? "ok" : "ng"}">
                <div><b>${ok ? "答對了" : "本題答錯"}</b></div>
                <p>正確答案：${answerLabelText(question.answer)}。${escapeHtml(explain.summary)}</p>
                <div class="answer-ladder">
                  ${explain.drillSteps
                    .map(
                      (step) => `<div>
                        <span>${escapeHtml(step.label)}</span>
                        <strong>${escapeHtml(step.value)}</strong>
                      </div>`,
                    )
                    .join("")}
                </div>
                <div class="detail-grid">
                  ${detailSection(
                    "判斷步驟",
                    `<ul class="detail-list">${explain.reasoning.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`,
                  )}
                  ${detailSection(
                    "常錯提醒",
                    `<ul class="detail-list warn">${explain.elimination.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`,
                  )}
                  ${detailSection(
                    "教材對照",
                    `<p>${escapeHtml(explain.anchor.title)}</p><small>${escapeHtml(explain.anchor.chapter)}｜${escapeHtml(explain.anchor.source)}</small>`,
                  )}
                </div>
                <div class="insight-panel">
                  <div class="insight-head">
                    <b>考點錨點</b>
                    <span>${escapeHtml(explain.insight.law)}｜${escapeHtml(explain.insight.source)}</span>
                  </div>
                  <div class="keyword-row">
                    ${explain.insight.keywords.map((item) => `<span>${escapeHtml(item)}</span>`).join("")}
                  </div>
                  <div class="insight-grid">
                    <section>
                      <h3>作答檢核</h3>
                      <ul class="detail-list">${explain.insight.checklist.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                    </section>
                    <section>
                      <h3>延伸追問</h3>
                      <ul class="detail-list">${explain.insight.prompts.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                    </section>
                  </div>
                </div>
                ${
                  context === "study"
                    ? `<div class="extension-panel">
                        <div class="related-head">
                          <b>延伸考題</b>
                          <span>${extensionCount ? `本主題共有 ${extensionCount} 題延伸／考古題` : "目前以同主題追打為主"}</span>
                        </div>
                        <div class="extension-actions">
                          <button class="outline" data-action="enter-extended">切到本主題延伸練習</button>
                          <button class="ghost" data-action="prev-topic">切到上一主題速查</button>
                        </div>
                        <div class="related-list">
                          ${extensionSet
                            .map(
                              (item) => `<button class="related-question" data-related-id="${item.id}">
                                <div class="related-top">
                                  <strong>${escapeHtml(item.badge)}</strong>
                                  <em>${escapeHtml(item.reason)}</em>
                                </div>
                                <span>${escapeHtml(item.question)}</span>
                              </button>`,
                            )
                            .join("")}
                        </div>
                      </div>`
                    : ""
                }
                <div class="tag-row">
                  <span>${escapeHtml(question.topic)}</span>
                  <span>${escapeHtml(question.workItemTitle || sourceLabel)}</span>
                  <span>${questionTypeLabel(question.type)}</span>
                </div>
              </div>`
            : ""
        }
      </section>`;
  }

  function header() {
    const last = progress.sessions?.[0] || {};
    return `
      <header class="app-header">
        <div class="brand"><span class="badge">安</span><div><b>職業安全衛生管理乙級</b><small>模擬考與練習系統</small></div></div>
        <nav>
          <button class="${state.view === "study" ? "active" : ""}" data-view="study">教材速查</button>
          <button class="${state.view === "exam" ? "active" : ""}" data-view="exam">模擬考</button>
          <button class="${state.mode === "wrong" ? "active" : ""}" data-mode="wrong" data-view="study">錯題回顧</button>
        </nav>
        <div class="top-stats">
          <span><b>${progress.totalAnswered || 0}</b><small>已作答</small></span>
          <span class="red"><b>${progress.lastMistakes?.length || 0}</b><small>錯題</small></span>
          <span><b>${last.pct ?? 0}%</b><small>最近正確率</small></span>
          <button class="outline" data-view="stats">查看統計</button>
        </div>
      </header>`;
  }

  function studyView() {
    const question = currentQuestion();
    const pool = filteredQuestions();
    const material = selectedMaterial();
    const note = materialNote(material);
    return `
      ${header()}
      <main class="workspace">
        <aside class="left-pane">
          <div class="mode-switch">
            <button class="${state.mode === "topic" ? "active" : ""}" data-mode="topic">教材 + 練題</button>
            <button class="${state.mode === "official" ? "active" : ""}" data-mode="official">只看官方題</button>
            <button class="${state.mode === "extended" ? "active" : ""}" data-mode="extended">延伸練習</button>
          </div>
          <label class="search"><span>搜尋</span><input value="${escapeAttr(state.query)}" data-input="query" placeholder="教材、法條、關鍵字" /></label>
          <div class="section-head"><span>PDF教材</span><b>${materials.length}</b></div>
          <div class="material-list">
            ${materials
              .map(
                (item, index) => `<button class="${state.materialId === item.id ? "active" : ""}" data-material="${item.id}">
                  <span class="pdf">PDF</span>
                  <strong>${String(index + 1).padStart(2, "0")} ${escapeHtml(item.title)}</strong>
                  <em>${escapeHtml(item.category || item.pageLabel || "教材")}</em>
                </button>`,
              )
              .join("")}
          </div>
          <div class="section-head small"><span>主題題量</span><b>${questions.length}</b></div>
          <div class="topic-list">
            ${uniqueTopics()
              .map((topic) => {
                const stat = topicProgress(topic);
                return `<button class="${state.topic === topic ? "active" : ""}" data-topic="${escapeAttr(topic)}">
                  <span>${escapeHtml(topic)}</span>
                  <small>${countTopic(topic)} 題 ${stat.total ? `${stat.correct}/${stat.total}` : "未作答"}</small>
                </button>`;
              })
              .join("")}
          </div>
        </aside>
        <section class="reader-pane">
          <div class="reader-toolbar">
            <button class="ghost" data-action="prev-topic">上一主題</button>
            <div><b>${escapeHtml(note.title)}</b><small>${escapeHtml(note.source)}</small></div>
            <span class="spacer"></span>
            <button class="ghost">100%</button>
            <button class="ghost" data-action="bookmark">收藏本題</button>
          </div>
          <article class="paper">
            <p class="eyebrow">教材速查 · ${escapeHtml(note.category)}</p>
            <h1>${escapeHtml(note.chapter)}</h1>
            <h3>${escapeHtml(note.title)}</h3>
            <p>${escapeHtml(note.excerpt)}</p>
            <div class="law-highlight"><b>本章摘要</b><p>${escapeHtml(note.highlight)}</p></div>
            <section class="cheat-sheet">
              <div class="cheat-head">
                <b>考前速查</b>
                <span>${escapeHtml(note.cheatSheet.law)}</span>
              </div>
              <div class="cheat-grid">
                <div>
                  <h3>必背判斷</h3>
                  <ul class="study-list">${note.cheatSheet.mustKnow.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                </div>
                <div>
                  <h3>易混淆對照</h3>
                  <ul class="study-list warn">${note.cheatSheet.compare.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                </div>
                <div>
                  <h3>練題切入</h3>
                  <ul class="study-list">${note.cheatSheet.drills.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                </div>
              </div>
            </section>
            <div class="quick-grid">
              <div><b>${note.total}</b><span>本章題數</span></div>
              <div><b>${note.official}</b><span>官方題</span></div>
              <div><b>${note.multi}</b><span>複選題</span></div>
            </div>
            <div class="note-grid">
              <section class="sheet-block">
                <h3>速查清單</h3>
                <ul class="study-list">
                  ${note.quickLook.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                </ul>
              </section>
              <section class="sheet-block">
                <h3>記憶掛鉤</h3>
                <ul class="study-list">
                  ${note.memoryHooks.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                </ul>
              </section>
            </div>
            <h3>複習策略</h3>
            <ul class="study-list">
              ${note.focus.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
            <h3>常見陷阱</h3>
            <ul class="study-list warn">
              ${note.traps.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
            <h3>建議下一步</h3>
            <ul class="study-list">
              ${note.reviewPlan.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
            <h3>題組提示</h3>
            <p>目前篩到 ${pool.length} 題。答題後會顯示判斷步驟、常錯提醒與教材對照，並推薦同主題延伸考題。</p>
            <div class="source-box">
              <b>教材來源</b>
              <span>${escapeHtml(note.source)}</span>
              ${note.url ? `<a href="${note.url}" target="_blank" rel="noreferrer">開啟 Google Drive</a>` : ""}
            </div>
          </article>
        </section>
        <aside class="right-pane">
          ${questionCard(question)}
          <div class="bottom-actions">
            <button class="ghost" data-action="prev-question">上一題</button>
            <button class="primary" data-action="check">${state.checked ? "收起詳解" : "查看答案"}</button>
            <button class="primary" data-action="next-question">下一題</button>
            <button class="ghost" data-action="uncertain">${state.uncertain.has(question.id) ? "取消不確定" : "標記不確定"}</button>
          </div>
        </aside>
      </main>`;
  }

  function examView() {
    if (!state.exam) startExam();
    const exam = state.exam;
    const question = exam.questions[exam.current];
    const answered = exam.answers.filter((answer) => answer.length).length;
    const remaining = Math.max(0, exam.endsAt - Date.now());
    const minutes = Math.floor(remaining / 60000);
    const seconds = Math.floor((remaining % 60000) / 1000);
    const score = exam.submitted ? gradeExam(exam) : null;
    return `
      ${header()}
      <main class="exam-layout">
        <aside class="exam-sheet">
          <div class="exam-title"><b>正式模擬考</b><small>單選 ${examRule.single || 60} 題｜複選 ${examRule.multi || 20} 題｜${examRule.minutes || 100} 分鐘</small></div>
          <div class="timer ${minutes < 10 ? "danger" : ""}">${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}</div>
          <div class="progress-line"><span style="width:${(answered / exam.questions.length) * 100}%"></span></div>
          <p>${answered} / ${exam.questions.length} 已作答，交卷前可自由切換題號。</p>
          <div class="number-grid">
            ${exam.questions
              .map((item, index) => `<button class="${index === exam.current ? "active" : ""} ${exam.answers[index].length ? "done" : ""}" data-exam-jump="${index}">${index + 1}</button>`)
              .join("")}
          </div>
          <button class="primary wide" data-action="submit-exam">交卷並結算</button>
          <button class="ghost wide" data-action="restart-exam">重新抽題</button>
        </aside>
        <section class="exam-main">
          ${score ? `<div class="score-banner"><b>${score.pass ? "模擬考通過" : "模擬考未通過"}</b><span>${score.score} / 100｜答對 ${score.correct} 題</span></div>` : ""}
          ${questionCard(question, "exam")}
          <div class="bottom-actions">
            <button class="ghost" data-action="exam-prev">上一題</button>
            <button class="primary" data-action="exam-next">下一題</button>
            <button class="ghost" data-action="uncertain">${state.uncertain.has(question.id) ? "取消不確定" : "標記不確定"}</button>
          </div>
          ${examReview(exam)}
        </section>
      </main>`;
  }

  function statsView() {
    const byTopic = uniqueTopics().map((topic) => ({ topic, count: countTopic(topic), ...topicProgress(topic) }));
    const officialCount = questions.filter((q) => sourceBucket(q) === "official").length;
    const extendedCount = questions.filter((q) => sourceBucket(q) === "extended").length;
    const multiCount = questions.filter((q) => q.type === "multi").length;
    return `
      ${header()}
      <main class="stats-page">
        <section class="stats-hero">
          <h1>題庫與作答統計</h1>
          <div class="stat-cards">
            <div><b>${officialCount}</b><span>官方題庫</span></div>
            <div><b>${extendedCount}</b><span>延伸與考古</span></div>
            <div><b>${multiCount}</b><span>複選題</span></div>
            <div><b>${progress.lastMistakes?.length || 0}</b><span>最近錯題</span></div>
          </div>
        </section>
        <section class="table-panel">
          <div class="section-head"><span>主題概況</span><b>${byTopic.length}</b></div>
          ${byTopic
            .map((row) => {
              const pct = row.total ? Math.round((row.correct / row.total) * 100) : 0;
              return `<button class="topic-row" data-topic="${escapeAttr(row.topic)}" data-view="study">
                <span>${escapeHtml(row.topic)}</span>
                <strong>${row.count} 題</strong>
                <em>${row.total ? `${row.correct}/${row.total}｜${pct}%` : "未建立作答紀錄"}</em>
              </button>`;
            })
            .join("")}
        </section>
      </main>`;
  }

  function render() {
    app.innerHTML = state.view === "exam" ? examView() : state.view === "stats" ? statsView() : studyView();
  }

  app.addEventListener("click", (event) => {
    const button = event.target.closest("button");
    if (!button) return;
    const action = button.dataset.action;

    if (button.dataset.view) {
      state.view = button.dataset.view;
      syncHash();
      if (button.dataset.mode) state.mode = button.dataset.mode;
      state.index = 0;
      state.selected = [];
      state.checked = false;
      render();
      return;
    }

    if (button.dataset.topic) {
      state.topic = button.dataset.topic;
      state.materialId = materialMap.get(state.topic)?.id || state.materialId;
      state.index = 0;
      state.selected = [];
      state.checked = false;
      render();
      return;
    }

    if (button.dataset.material) {
      const material = materials.find((item) => item.id === button.dataset.material);
      if (material) {
        state.materialId = material.id;
        state.topic = material.topic;
      }
      state.index = 0;
      state.selected = [];
      state.checked = false;
      render();
      return;
    }

    if (button.dataset.mode) {
      state.mode = button.dataset.mode;
      state.index = 0;
      state.selected = [];
      state.checked = false;
      render();
      return;
    }

    if (button.dataset.answer !== undefined) {
      if (state.view === "exam") {
        const index = Number(button.dataset.answer);
        const exam = state.exam;
        const question = exam.questions[exam.current];
        const current = exam.answers[exam.current];
        exam.answers[exam.current] =
          question.type === "single" ? [index] : current.includes(index) ? current.filter((item) => item !== index) : [...current, index].sort();
      } else {
        toggleAnswer(Number(button.dataset.answer));
      }
      render();
      return;
    }

    if (button.dataset.examJump !== undefined) {
      state.exam.current = Number(button.dataset.examJump);
      render();
      return;
    }

    if (button.dataset.relatedId) {
      jumpToQuestion(button.dataset.relatedId);
      render();
      return;
    }

    const question = state.view === "exam" ? state.exam.questions[state.exam.current] : currentQuestion();

    if (action === "check") state.checked = !state.checked;
    if (action === "next-question") {
      state.index += 1;
      state.selected = [];
      state.checked = false;
    }
    if (action === "prev-question") {
      state.index -= 1;
      state.selected = [];
      state.checked = false;
    }
    if (action === "prev-topic") {
      jumpTopic(-1);
    }
    if (action === "bookmark") {
      const id = state.view === "exam" ? state.exam.questions[state.exam.current].id : question.id;
      state.bookmarks.has(id) ? state.bookmarks.delete(id) : state.bookmarks.add(id);
      saveBookmarks();
    }
    if (action === "uncertain") {
      const id = state.view === "exam" ? state.exam.questions[state.exam.current].id : question.id;
      state.uncertain.has(id) ? state.uncertain.delete(id) : state.uncertain.add(id);
    }
    if (action === "enter-extended") {
      openExtendedMode(question);
    }
    if (action === "exam-next") state.exam.current = Math.min(state.exam.questions.length - 1, state.exam.current + 1);
    if (action === "exam-prev") state.exam.current = Math.max(0, state.exam.current - 1);
    if (action === "submit-exam") state.exam.submitted = true;
    if (action === "jump-first-mistake") {
      const firstMistake = examMistakes(state.exam)[0];
      if (firstMistake) state.exam.current = firstMistake.index;
    }
    if (action === "restart-exam") startExam();
    render();
  });

  app.addEventListener("input", (event) => {
    if (event.target.dataset.input === "query") {
      state.query = event.target.value;
      state.index = 0;
      render();
    }
  });

  window.addEventListener("hashchange", () => {
    const nextView = viewFromHash();
    if (state.view === nextView) return;
    state.view = nextView;
    state.index = 0;
    state.selected = [];
    state.checked = false;
    render();
  });

  setInterval(() => {
    if (state.view === "exam" && state.exam && !state.exam.submitted) render();
  }, 1000);

  render();
})();

    </script>
  </body>
</html>
